{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="{{ back_url }}" class="text-gray-400 hover:text-gray-600">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>
    </a>
    <h1 class="text-2xl font-bold text-gray-900">{{ title }}</h1>
  </div>

  <form method="post" class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 space-y-5">
    {% csrf_token %}
    {% for field in form %}
    <div>
      <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">{{ field.label }}</label>
      {{ field }}
      {% if field.help_text %}<p class="text-xs text-gray-400 mt-1 leading-relaxed">{{ field.help_text|safe }}</p>{% endif %}
      {% if field.errors %}<p class="text-red-600 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
    </div>
    {% endfor %}

    <div class="flex gap-3 pt-2">
      <button type="submit" class="bg-amber-500 hover:bg-amber-600 text-white font-medium rounded-lg px-5 py-2.5 text-sm transition-colors">Salvar</button>
      <a href="{{ back_url }}" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-lg px-5 py-2.5 text-sm transition-colors">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
