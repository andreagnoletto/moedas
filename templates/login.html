{% extends "base.html" %}
{% block title %}Login — CoinsDB{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <h1 class="text-xl font-bold text-gray-900 text-center mb-6">Login</h1>
    {% if form.errors %}
    <p class="text-red-600 text-sm text-center mb-4">Usuário ou senha incorretos.</p>
    {% endif %}
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
        <input type="text" name="username" id="id_username" autofocus
          class="rounded-lg border border-gray-200 px-3 py-2 text-sm w-full focus:outline-none focus:ring-2 focus:ring-amber-500">
      </div>
      <div>
        <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
        <input type="password" name="password" id="id_password"
          class="rounded-lg border border-gray-200 px-3 py-2 text-sm w-full focus:outline-none focus:ring-2 focus:ring-amber-500">
      </div>
      <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-medium rounded-lg px-5 py-2.5 text-sm transition-colors">Entrar</button>
    </form>
  </div>
</div>
{% endblock %}
