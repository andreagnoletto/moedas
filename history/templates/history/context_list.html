{% extends "base.html" %}
{% block title %}Histórico — CoinsDB{% endblock %}

{% block content %}
<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
  <div class="flex items-center gap-3">
    <h1 class="text-2xl font-bold text-gray-900">Contextos Históricos</h1>
    {% if user.is_authenticated %}<a href="{% url 'context-create' %}" class="bg-amber-500 hover:bg-amber-600 text-white font-medium rounded-lg px-4 py-2 text-sm transition-colors">+ Novo contexto</a>{% endif %}
  </div>
  <div class="flex gap-2">
    <input type="search" name="q" value="{{ q }}" placeholder="Buscar título..."
      class="rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"
      hx-get="{% url 'context-list' %}" hx-trigger="input changed delay:300ms" hx-target="#results" hx-include="[name='country']">
    <select name="country"
      class="rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"
      hx-get="{% url 'context-list' %}" hx-trigger="change" hx-target="#results" hx-include="[name='q']">
      <option value="">Todos os países</option>
      {% for c in countries %}<option value="{{ c.id }}" {% if c.id|stringformat:"d" == country_id %}selected{% endif %}>{{ c.name }}</option>{% endfor %}
    </select>
  </div>
</div>
<div id="results">
  {% include "history/context_table.html" %}
</div>
{% endblock %}
