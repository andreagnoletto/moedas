{% extends "base.html" %}
{% block title %}Coleção — CoinsDB{% endblock %}

{% block content %}
<div x-data="collectionPage()">

<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
  <div class="flex items-center gap-3">
    <h1 class="text-2xl font-bold text-gray-900">Minha Coleção</h1>
    {% if user.is_authenticated %}<a href="{% url 'coinitem-create' %}" class="bg-amber-500 hover:bg-amber-600 text-white font-medium rounded-lg px-4 py-2 text-sm transition-colors">+ Novo item</a>{% endif %}
    <button @click="exportSelected('{% url 'export-coinitems' %}')" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-lg px-4 py-2 text-sm transition-colors">Exportar CSV</button>
  </div>
  <div class="flex flex-wrap gap-2">
    <input type="search" name="q" value="{{ q }}" placeholder="Buscar moeda..."
      class="rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"
      hx-get="{% url 'coinitem-list' %}" hx-trigger="input changed delay:300ms" hx-target="#results" hx-include="[name='condition'],[name='location'],[name='sort']">
    <input type="hidden" name="sort" value="{{ sort }}">
    <select name="condition"
      class="rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"
      hx-get="{% url 'coinitem-list' %}" hx-trigger="change" hx-target="#results" hx-include="[name='q'],[name='location'],[name='sort']">
      <option value="">Todas conservações</option>
      {% for val, label in conditions %}<option value="{{ val }}" {% if val == condition %}selected{% endif %}>{{ label }}</option>{% endfor %}
    </select>
    <select name="location"
      class="rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"
      hx-get="{% url 'coinitem-list' %}" hx-trigger="change" hx-target="#results" hx-include="[name='q'],[name='condition'],[name='sort']">
      <option value="">Todos os locais</option>
      {% for loc in locations %}{% if loc %}<option value="{{ loc }}" {% if loc == location %}selected{% endif %}>{{ loc }}</option>{% endif %}{% endfor %}
    </select>
  </div>
</div>

<div x-show="selected.length > 0" class="mb-4 text-sm text-gray-500">
  <span x-text="selected.length"></span> selecionado(s)
</div>

<div id="results">
  {% include "collection/coinitem_table.html" %}
</div>


</div>

<script>
function collectionPage() {
  return {
    selected: [],
    toggleAll(checked) {
      if (checked) {
        this.selected = [...document.querySelectorAll('[data-row-id]')].map(el => el.dataset.rowId);
      } else {
        this.selected = [];
      }
    },
    selectEverything() {
      this.selected = ['all'];
    },
    exportSelected(baseUrl) {
      const ids = this.selected.includes('all') ? '' : this.selected.join(',');
      window.location.href = baseUrl + (ids ? '?ids=' + ids : '');
    }
  }
}
</script>
{% endblock %}
