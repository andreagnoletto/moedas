{% extends "base.html" %}
{% block title %}Doadores — CoinsDB{% endblock %}

{% block content %}
<div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
  <div class="flex items-center gap-3">
    <h1 class="text-2xl font-bold text-gray-900">Doadores</h1>
    <a href="{% url 'donor-create' %}" class="bg-amber-500 hover:bg-amber-600 text-white font-medium rounded-lg px-4 py-2 text-sm transition-colors">+ Novo doador</a>
  </div>
  <input type="search" name="q" value="{{ q }}" placeholder="Buscar doador..."
    class="rounded-lg border border-gray-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500"
    hx-get="{% url 'donor-list' %}" hx-trigger="input changed delay:300ms" hx-target="#results">
</div>
<div id="results">
  {% include "collection/donor_table.html" %}
</div>
{% endblock %}
