<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
  <div class="overflow-x-auto">
    <table class="min-w-full text-sm">
      <thead><tr class="bg-gray-50 border-b border-gray-100">
        <th class="text-left px-4 py-3 font-medium text-gray-500">País</th>
        <th class="text-left px-4 py-3 font-medium text-gray-500">ISO</th>
        <th class="text-left px-4 py-3 font-medium text-gray-500">Região</th>
        <th class="text-left px-4 py-3 font-medium text-gray-500">Moeda</th>
        <th class="text-right px-4 py-3 font-medium text-gray-500">Tipos</th>
      </tr></thead>
      <tbody>
        {% for c in countries %}
        <tr class="border-b border-gray-50 hover:bg-amber-50/50 transition-colors">
          <td class="px-4 py-3 font-medium text-gray-900">{{ c.name }}</td>
          <td class="px-4 py-3 text-gray-500">{{ c.iso2 }} / {{ c.iso3 }}</td>
          <td class="px-4 py-3 text-gray-500">{{ c.region }}</td>
          <td class="px-4 py-3 text-gray-500">{{ c.currency_symbol }} {{ c.currency }}</td>
          <td class="px-4 py-3 text-right">
            {% if c.coin_count %}<span class="inline-block px-2 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800">{{ c.coin_count }}</span>{% else %}<span class="text-gray-300">—</span>{% endif %}
          </td>
        </tr>
        {% empty %}
        <tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">Nenhum país encontrado.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
  <div class="px-4 py-3 border-t border-gray-100 text-sm text-gray-400">{{ countries|length }} países</div>
</div>
